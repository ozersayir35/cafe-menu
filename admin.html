<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiçbi' Yer - Admin Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
            color: #1a202c;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3748 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 2px solid #8b5cf6;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #2d3748;
            background: linear-gradient(135deg, rgba(45, 55, 72, 0.5) 0%, rgba(26, 31, 58, 0.5) 100%);
            padding: 15px;
            border-radius: 12px;
        }

        .tab-button {
            padding: 12px 24px;
            background: transparent;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #a0aec0;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .tab-button.active {
            color: white;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            border-color: #8b5cf6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .order-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            border-left: 5px solid #8b5cf6;
            transition: all 0.3s;
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
        }

        .order-card.completed {
            border-left-color: #10b981;
        }

        .order-card.preparing {
            border-left-color: #f97316;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-id {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
        }

        .order-time {
            font-size: 12px;
            color: #718096;
        }

        .order-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-preparing {
            background: #fed7aa;
            color: #9a3412;
        }

        .status-ready {
            background: #d1fae5;
            color: #065f46;
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-items h4 {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: #4a5568;
            border-bottom: 1px solid #edf2f7;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 2px solid #e2e8f0;
            font-weight: 700;
            color: #1a202c;
        }

        .order-total span:first-child {
            color: #8b5cf6;
        }

        .status-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .status-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-btn-preparing {
            background: #fed7aa;
            color: #9a3412;
        }

        .status-btn-preparing:hover {
            background: #fdba74;
        }

        .status-btn-ready {
            background: #d1fae5;
            color: #065f46;
        }

        .status-btn-ready:hover {
            background: #a7f3d0;
        }

        .complete-btn {
            background: #10b981;
            color: white;
            width: 100%;
            padding: 12px;
        }

        .complete-btn:hover {
            background: #059669;
        }

        .notification-btn {
            background: #8b5cf6;
            color: white;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        .notification-btn:hover {
            background: #7c3aed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #1a202c;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a202c;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.3);
        }

        .badge {
            display: inline-block;
            background: #f0f4f8;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .orders-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 Hiçbi' Yer Admin Paneli</h1>
            <p style="color: #cbd5e0; margin-top: 10px;">Siparişleri yönet ve müşterilerine bildirim gönder</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('orders')">📋 Siparişler</button>
            <button class="tab-button" onclick="switchTab('settings')">⚙️ Ayarlar</button>
        </div>

        <!-- SİPARİŞLER TAB'I -->
        <div id="orders" class="tab-content active">
            <div id="ordersContainer" class="orders-grid">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Henüz sipariş yok</p>
                </div>
            </div>
        </div>

        <!-- AYARLAR TAB'I -->
        <div id="settings" class="tab-content">
            <div class="section">
                <h2>Cafe Bilgileri</h2>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Cafe Adı</label>
                        <input type="text" id="cafeName" placeholder="Hiçbi' Yer">
                    </div>
                    <div class="form-group">
                        <label>Telefon Numarası</label>
                        <input type="tel" id="cafePhone" placeholder="+90 (555) 123-4567">
                    </div>
                </div>
                <button onclick="saveCafeInfo()">Kaydet</button>
            </div>

            <div class="section">
                <h2>Veri İşlemleri</h2>
                <button onclick="exportOrders()" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); margin-bottom: 10px;">📥 Siparişleri İndir</button>
                <button onclick="clearAllOrders()" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); margin-left: 10px;">🗑️ Tüm Siparişleri Sil</button>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let cafeInfo = {
            name: "Hiçbi' Yer",
            phone: "+905551234567"
        };

        function loadData() {
            const saved = localStorage.getItem('cafeOrders');
            if (saved) {
                allOrders = JSON.parse(saved);
            }
            
            const savedInfo = localStorage.getItem('cafeInfo');
            if (savedInfo) {
                cafeInfo = JSON.parse(savedInfo);
            }
            
            loadCafeInfo();
            renderOrders();

            // Her 2 saniyede bir yenile (siparişler gelişini kontrol et)
            setInterval(renderOrders, 2000);
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (allOrders.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>Henüz sipariş yok</p>
                        </div>
                    </div>
                `;
                return;
            }

            // En yeni siparişleri en üstte göster
            const sortedOrders = [...allOrders].reverse();

            container.innerHTML = sortedOrders.map(order => `
                <div class="order-card ${order.status === 'ready' ? 'completed' : 'preparing'}">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Sipariş #${order.id}</div>
                            <div class="order-time">${new Date(order.timestamp).toLocaleString('tr-TR')}</div>
                        </div>
                        <div class="order-status status-${order.status}">
                            ${getStatusText(order.status)}
                        </div>
                    </div>

                    <div class="order-items">
                        <h4>Ürünler:</h4>
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>${item.quantity}x ${item.name}</span>
                                <span>₺${item.price * item.quantity}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-total">
                        <span>Toplam:</span>
                        <span>₺${order.total}</span>
                    </div>

                    ${order.status !== 'ready' ? `
                        <div class="status-buttons">
                            ${order.status === 'pending' ? `
                                <button class="status-btn status-btn-preparing" onclick="updateOrderStatus('${order.id}', 'preparing')">
                                    🍳 Hazırlanıyor
                                </button>
                            ` : ''}
                            <button class="status-btn status-btn-ready" onclick="updateOrderStatus('${order.id}', 'ready')">
                                ✅ Hazır
                            </button>
                        </div>
                    ` : ''}

                    <button class="notification-btn" onclick="sendNotification('${order.id}')">
                        📲 Müşteriye Bildir
                    </button>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const statuses = {
                'pending': '⏳ Beklemede',
                'preparing': '🍳 Hazırlanıyor',
                'ready': '✅ Hazır'
            };
            return statuses[status] || status;
        }

        function updateOrderStatus(orderId, newStatus) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                saveOrders();
                renderOrders();
            }
        }

        function sendNotification(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                const statusMsg = {
                    'pending': 'Siparişiniz alındı, hazırlanmaya başlandı! ⏳',
                    'preparing': 'Siparişiniz hazırlanıyor! 🍳',
                    'ready': 'Siparişiniz hazır! Lütfen alabilirsiniz. ✅'
                };

                // LocalStorage'da müşterinin bildirimini kaydet
                const notification = {
                    orderId: order.id,
                    message: statusMsg[order.status],
                    timestamp: new Date().toISOString(),
                    status: order.status
                };

                let notifications = JSON.parse(localStorage.getItem('orderNotifications') || '[]');
                notifications.push(notification);
                localStorage.setItem('orderNotifications', JSON.stringify(notifications));

                alert(`✅ Müşteriye bildirim gönderildi!\n\n"${statusMsg[order.status]}"`);
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function loadCafeInfo() {
            document.getElementById('cafeName').value = cafeInfo.name;
            document.getElementById('cafePhone').value = cafeInfo.phone;
        }

        function saveCafeInfo() {
            cafeInfo.name = document.getElementById('cafeName').value;
            cafeInfo.phone = document.getElementById('cafePhone').value;
            localStorage.setItem('cafeInfo', JSON.stringify(cafeInfo));
            alert('✅ Bilgiler kaydedildi!');
        }

        function saveOrders() {
            localStorage.setItem('cafeOrders', JSON.stringify(allOrders));
        }

        function exportOrders() {
            const dataStr = JSON.stringify(allOrders, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `siparisler-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function clearAllOrders() {
            if (confirm('TÜM SİPARİŞLER SİLİNECEK! Emin misiniz?')) {
                if (confirm('Son kontrol: Devam etmek istiyor musunuz?')) {
                    allOrders = [];
                    saveOrders();
                    renderOrders();
                    alert('✅ Tüm siparişler silindi!');
                }
            }
        }

        loadData();
    </script>
</body>
</html>
